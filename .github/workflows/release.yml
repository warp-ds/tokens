---
name: Release
on:
  push:
    branches:
    - master
    - alpha
    - beta
    - next
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - uses: pnpm/action-setup@v2
        with:
          version: 7
          run_install: true
      - name: Build
        run: pnpm build
